name: Pipeline CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes com Mocha
        run: npm test

      - name: Construir imagem Docker
        run: docker build -t meu-projeto .

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag da imagem
        run: docker tag meu-projeto ${{ secrets.DOCKERHUB_USERNAME }}/meu-projeto:latest

      - name: Enviar imagem para Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/meu-projeto:latest